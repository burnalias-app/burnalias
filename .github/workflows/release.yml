name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (example: v0.1.0)
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          echo "ghcr_image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/burnalias" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${{ secrets.DOCKERHUB_USERNAME }}/burnalias" >> "$GITHUB_OUTPUT"
          echo "release_tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.ghcr_image }}:latest
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.dockerhub_image }}:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
